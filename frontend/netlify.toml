# ============================================================
# Netlify 部署配置
# ============================================================

[build]
  command = "npx vite build"
  publish = "dist"

# ─── 密码认证（最先执行）──────────────────────────────────────
# 免费 Basic Auth，替代付费的 Visitor Access
[[edge_functions]]
  path = "/*"
  function = "auth"

# ─── API 代理 ──────────────────────────────────────────────────
# 所有 /api/* 请求由 api-proxy 转发到 BACKEND_URL
[[edge_functions]]
  path = "/api/*"
  function = "api-proxy"

# ─── SPA 回退 ──────────────────────────────────────────────────
# 所有非 API 路径 → index.html（React Router 处理路由）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
