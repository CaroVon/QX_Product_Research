# ============================================================
# Research Agent —— Alembic 数据库迁移配置
# ============================================================

# Alembic Config 路径
[alembic]
script_location = alembic
# 迁移脚本生成模板
file_template = %%(rev)s_%%(slug)s

# SQLAlchemy 数据库 URL（同步连接串）
# 使用 PendingDeprecationWarning-safe 的同步 URL
sqlalchemy.url = sqlite:///./runtime/local_dev.db

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
